<h1>سياسة الخصوصية</h1>

<p>نحترم خصوصيتك ونلتزم بحماية بياناتك.</p>

<ul>
<li>لا يتم مشاركة أي بيانات مع أطراف خارجية.</li>
<li>يتم تخزين النسخ الاحتياطية داخل حساب Google Drive الخاص بالمستخدم.</li>
<li>يمكن للمستخدم حذف بياناته في أي وقت.</li>
</ul>
